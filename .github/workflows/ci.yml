name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  wasm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Emscripten SDK
      uses: mymindstorm/setup-emsdk@v14
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        version: latest
        actions-cache-folder: 'emsdk-cache'
    
    - name: Build WASM renderer
      run: npm run wasm:build
    
    - name: Validate WASM artifacts
      run: node scripts/validate_wasm_artifacts.js
    
    - name: Check artifacts are not stale
      run: |
        echo "Checking artifact timestamps..."
        WASM_FILE="public/wasm/pixelocity_wasm.wasm"
        SOURCE_DIR="wasm_renderer"
        
        # Check that WASM file exists and get its timestamp
        if [ ! -f "$WASM_FILE" ]; then
          echo "❌ WASM artifact not found: $WASM_FILE"
          exit 1
        fi
        WASM_TIME=$(stat -c %Y "$WASM_FILE" 2>/dev/null || stat -f %m "$WASM_FILE" 2>/dev/null)
        if [ -z "$WASM_TIME" ] || [ "$WASM_TIME" = "0" ]; then
          echo "❌ Could not determine WASM file timestamp"
          exit 1
        fi
        
        # Find the most recent source file timestamp
        # Use find with common stat format (-exec) for cross-platform compatibility
        LATEST_SOURCE=$(find "$SOURCE_DIR" -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.sh" \) -exec stat -c %Y {} \; 2>/dev/null | sort -n | tail -1)
        if [ -z "$LATEST_SOURCE" ]; then
          echo "❌ No source files found in $SOURCE_DIR"
          exit 1
        fi
        
        # Convert float timestamp to integer if needed (strip decimal)
        LATEST_SOURCE_INT=$(printf "%.0f" "$LATEST_SOURCE")
        
        if [ "$WASM_TIME" -lt "$LATEST_SOURCE_INT" ]; then
          echo "❌ WASM artifact is older than source files (WASM: $WASM_TIME, Latest source: $LATEST_SOURCE_INT)"
          exit 1
        fi
        echo "✅ WASM artifact is up to date with source files"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run shader list generation
      run: node scripts/generate_shader_lists.js
    
    - name: Run shader metadata audit
      run: node scripts/audit_mouse_shaders.js
    
    - name: Check for duplicate shader IDs
      run: node scripts/check_duplicates.js

    - name: Verify TypeScript resolution
      run: |
        node -e "require.resolve('typescript'); console.log('typescript OK:', require('typescript').version)"
        npx tsc --version
    
    - name: Run unit tests
      run: npm test -- --watchAll=false --ci --coverage
      env:
        CI: true
    
    - name: Build project
      run: npm run build
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: github.event_name == 'pull_request'

  test-wasm-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [wasm, test]
    if: always() && needs.wasm.result == 'success'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Emscripten SDK
      uses: mymindstorm/setup-emsdk@v14
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        version: latest
        actions-cache-folder: 'emsdk-cache'
    
    - name: Build WASM renderer
      run: npm run wasm:build
    
    - name: Build production app
      run: npm run build
    
    - name: Install Playwright browsers
      run: npx playwright install chromium
    
    - name: Run WASM Playwright smoke tests
      run: npx playwright test tests/wasm-renderer.smoke.spec.ts --project=chromium
      env:
        CI: true
    
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: wasm-playwright-report
        path: playwright-report/
        retention-days: 30

  wgsl-precommit-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install naga CLI
      run: |
        rustup update stable
        cargo install naga-cli
    
    - name: Run WGSL pre-commit gate on changed files
      run: python3 scripts/wgsl_precommit_gate.py --base origin/main
    
    - name: Upload gate report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: wgsl-precommit-report
        path: reports/wgsl_precommit_report.json
        retention-days: 30

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npx eslint src --ext .ts,.tsx --max-warnings=0 || true
    
    - name: Generate shader lists
      run: node scripts/generate_shader_lists.js

    - name: Validate JSON manifests
      run: |
        for f in public/shader-lists/*.json; do
          echo "Validating $f"
          node -e "JSON.parse(require('fs').readFileSync('$f'))"
        done
