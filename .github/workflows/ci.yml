name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  wasm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Emscripten SDK
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: latest
        actions-cache-folder: 'emsdk-cache'
    
    - name: Build WASM renderer
      run: npm run wasm:build
    
    - name: Validate WASM artifacts
      run: node scripts/validate_wasm_artifacts.js
    
    - name: Check artifacts are not stale
      run: |
        echo "Checking artifact timestamps..."
        WASM_FILE="public/wasm/pixelocity_wasm.wasm"
        SOURCE_DIR="wasm_renderer"
        
        # Find the most recent source file in wasm_renderer
        LATEST_SOURCE=$(find "$SOURCE_DIR" -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.sh" \) -printf '%T@\n' | sort -n | tail -1)
        WASM_TIME=$(stat -c %Y "$WASM_FILE" 2>/dev/null || stat -f %m "$WASM_FILE" 2>/dev/null || echo 0)
        
        if [ -z "$LATEST_SOURCE" ]; then
          echo "❌ No source files found in $SOURCE_DIR"
          exit 1
        fi
        
        if [ "$WASM_TIME" -lt "${LATEST_SOURCE%.*}" ]; then
          echo "❌ WASM artifact is older than source files"
          exit 1
        fi
        echo "✅ WASM artifact is up to date with source files"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run shader list generation
      run: node scripts/generate_shader_lists.js
    
    - name: Run shader metadata audit
      run: node scripts/audit_mouse_shaders.js
    
    - name: Check for duplicate shader IDs
      run: node scripts/check_duplicates.js

    - name: Verify TypeScript resolution
      run: |
        node -e "require.resolve('typescript'); console.log('typescript OK:', require('typescript').version)"
        npx tsc --version
    
    - name: Run unit tests
      run: npm test -- --watchAll=false --ci --coverage
      env:
        CI: true
    
    - name: Build project
      run: npm run build
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: github.event_name == 'pull_request'

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run ESLint
      run: npx eslint src --ext .ts,.tsx --max-warnings=0 || true
    
    - name: Generate shader lists
      run: node scripts/generate_shader_lists.js

    - name: Validate JSON manifests
      run: |
        for f in public/shader-lists/*.json; do
          echo "Validating $f"
          node -e "JSON.parse(require('fs').readFileSync('$f'))"
        done
